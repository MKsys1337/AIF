name: CI — Swift

on:
  push:
    branches: [main]
    paths:
      - "packages/swift/**"
      - ".github/workflows/ci-swift.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/swift/**"
      - ".github/workflows/ci-swift.yml"

jobs:
  build:
    runs-on: macos-15

    defaults:
      run:
        working-directory: packages/swift

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
